  .updated-row{display:flex;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap;}

    font-family:'Inter',sans-serif;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;
    background:var(--ink);color:var(--canvas);border:none;cursor:pointer;
  }
  .refresh-btn:hover{background:#000;}
  .refresh-btn:disabled{opacity:.5;cursor:default;}
